# CBT Made Simple 2e (Josefowitz & Myran, 2021) — 全书可抽取单元
# 页码：PDF 阅读器 1-based 页码（与 pypdf 页索引 +1 一致）
# 用途：把心雀需要的「技能」从基础理论到干预、案例、附录答案全部结构化列出，
#       再人工/半自动改写成 app/skills/**/*.skill.md 或内部 RAG，而非仅 Part 3。
#
# xinque_role 说明：
#   agent_guidance     — 偏「教练/咨询师怎么做」，可蒸馏进 system_prompt、内部规范
#   psychoeducation    — 可改成对用户说明 CBT 框架的短内容
#   formulation        — 与个案概念化、四因素、识别想法/情绪等对齐，强化 formulate / 探索
#   session_structure  — 会谈结构、议程、作业；可映射会话阶段或 save_session 提示
#   intervention       — 典型 load_skill 候选
#   beliefs            — 核心信念/假设/行为实验；长程、需谨慎禁忌
#   case_integration   — 整案示范，适合评估集、少样本、内部培训
#   reference_only     — 附录答案、参考文献等，一般不直接当用户-facing skill

source:
  id: josefowitz_myran_cbt_made_simple_2e
  pdf_glob: "CBT Made Simple*.pdf"
